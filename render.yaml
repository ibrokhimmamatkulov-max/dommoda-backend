services:
  - type: web
    name: dommoda-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && alembic stamp 001 || true && alembic upgrade head && python seed.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_LOGIN
        value: admin
      - key: ADMIN_PASSWORD
        value: dommoda2024
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://dommoda.vercel.app,https://backanddommoda.onrender.com,http://localhost:3000
