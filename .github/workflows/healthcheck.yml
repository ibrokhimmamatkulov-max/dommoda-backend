name: Health Check

on:
  schedule:
    - cron: '*/30 * * * *'   # каждые 30 минут
  workflow_dispatch:           # ручной запуск для теста

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Check backend API
        id: backend
        run: |
          echo "Checking backend..."
          START=$(date +%s)

          # Render free tier спит — даём 90 секунд на пробуждение
          HTTP_CODE=$(curl -s -o /tmp/backend.json -w "%{http_code}" \
            --max-time 90 \
            "https://backanddommoda.onrender.com/api/products?limit=1")

          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "elapsed=${ELAPSED}" >> $GITHUB_OUTPUT
          echo "http_code=${HTTP_CODE}" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "status=error" >> $GITHUB_OUTPUT
            echo "❌ Backend вернул HTTP $HTTP_CODE"
            exit 0
          fi

          TOTAL=$(cat /tmp/backend.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total', 0))")
          echo "products_total=${TOTAL}" >> $GITHUB_OUTPUT

          if [ "$TOTAL" -eq "0" ]; then
            echo "status=no_products" >> $GITHUB_OUTPUT
            echo "⚠️ Backend работает но товаров нет (total=0)"
          elif [ "$ELAPSED" -gt "30" ]; then
            echo "status=slow" >> $GITHUB_OUTPUT
            echo "⚠️ Backend ответил за ${ELAPSED}s (просыпался), товаров: ${TOTAL}"
          else
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "✅ Backend OK за ${ELAPSED}s, товаров: ${TOTAL}"
          fi

      - name: Check frontend
        id: frontend
        run: |
          echo "Checking frontend..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://dommoda.vercel.app")
          echo "http_code=${HTTP_CODE}" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "✅ Frontend OK (HTTP $HTTP_CODE)"
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "❌ Frontend вернул HTTP $HTTP_CODE"
          fi

      - name: Send Telegram alert on failure
        if: |
          steps.backend.outputs.status == 'error' ||
          steps.backend.outputs.status == 'no_products' ||
          steps.frontend.outputs.status == 'error'
        run: |
          BACKEND_STATUS="${{ steps.backend.outputs.status }}"
          FRONTEND_STATUS="${{ steps.frontend.outputs.status }}"
          ELAPSED="${{ steps.backend.outputs.elapsed }}"
          TOTAL="${{ steps.backend.outputs.products_total }}"

          if [ "$BACKEND_STATUS" = "error" ]; then
            BACKEND_MSG="🔴 Бэкенд не отвечает (HTTP ${{ steps.backend.outputs.http_code }})"
          elif [ "$BACKEND_STATUS" = "no_products" ]; then
            BACKEND_MSG="🟡 Бэкенд работает но товаров нет в БД!"
          else
            BACKEND_MSG="✅ Бэкенд OK (${ELAPSED}s, товаров: ${TOTAL})"
          fi

          if [ "$FRONTEND_STATUS" = "error" ]; then
            FRONTEND_MSG="🔴 Сайт не открывается (HTTP ${{ steps.frontend.outputs.http_code }})"
          else
            FRONTEND_MSG="✅ Сайт открывается"
          fi

          TIME=$(date -u '+%d.%m.%Y %H:%M UTC')

          TEXT="🚨 *Dommoda — проблема!*

${BACKEND_MSG}
${FRONTEND_MSG}

🕐 ${TIME}
🔗 https://dommoda.vercel.app"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"${TEXT}\", \"parse_mode\": \"Markdown\"}"

      - name: Send Telegram alert if backend slow
        if: steps.backend.outputs.status == 'slow'
        run: |
          ELAPSED="${{ steps.backend.outputs.elapsed }}"
          TOTAL="${{ steps.backend.outputs.products_total }}"
          TIME=$(date -u '+%d.%m.%Y %H:%M UTC')

          TEXT="⚠️ *Dommoda — сервер просыпался*

🐢 Бэкенд ответил за ${ELAPSED} сек (был в спячке)
🛍 Товаров в базе: ${TOTAL}
✅ Сейчас всё работает

🕐 ${TIME}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"${TEXT}\", \"parse_mode\": \"Markdown\"}"
