name: Health Check

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      test_alert:
        description: 'Отправить тестовое уведомление в Telegram'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Send test alert
        if: github.event.inputs.test_alert == 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TIME=$(date -u '+%d.%m.%Y %H:%M UTC')
          MSG=$(printf '✅ *Dommoda — тест уведомлений*\n\nЕсли видишь это — мониторинг работает правильно\!\n\n🕐 %s' "$TIME")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${MSG}\",\"parse_mode\":\"Markdown\"}"

      - name: Check backend API
        if: github.event.inputs.test_alert != 'true'
        id: backend
        run: |
          START=$(date +%s)
          HTTP_CODE=$(curl -s -o /tmp/backend.json -w "%{http_code}" --max-time 90 "https://backanddommoda.onrender.com/api/products?limit=1")
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "elapsed=${ELAPSED}" >> $GITHUB_OUTPUT
          echo "http_code=${HTTP_CODE}" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" != "200" ]; then
            echo "status=error" >> $GITHUB_OUTPUT
          else
            TOTAL=$(python3 -c "import json; d=json.load(open('/tmp/backend.json')); print(d.get('total',0))")
            echo "products_total=${TOTAL}" >> $GITHUB_OUTPUT
            if [ "$TOTAL" = "0" ]; then
              echo "status=no_products" >> $GITHUB_OUTPUT
            elif [ "$ELAPSED" -gt "30" ]; then
              echo "status=slow" >> $GITHUB_OUTPUT
            else
              echo "status=ok" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Check frontend
        if: github.event.inputs.test_alert != 'true'
        id: frontend
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://dommoda.vercel.app")
          echo "http_code=${HTTP_CODE}" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      - name: Alert on critical failure
        if: github.event.inputs.test_alert != 'true' && (steps.backend.outputs.status == 'error' || steps.backend.outputs.status == 'no_products' || steps.frontend.outputs.status == 'error')
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BACKEND_STATUS="${{ steps.backend.outputs.status }}"
          FRONTEND_STATUS="${{ steps.frontend.outputs.status }}"
          TIME=$(date -u '+%d.%m.%Y %H:%M UTC')
          if [ "$BACKEND_STATUS" = "error" ]; then
            B="🔴 Бэкенд не отвечает (HTTP ${{ steps.backend.outputs.http_code }})"
          elif [ "$BACKEND_STATUS" = "no_products" ]; then
            B="🟡 Бэкенд работает, но товаров нет в базе!"
          else
            B="✅ Бэкенд OK"
          fi
          if [ "$FRONTEND_STATUS" = "error" ]; then
            F="🔴 Сайт не открывается (HTTP ${{ steps.frontend.outputs.http_code }})"
          else
            F="✅ Сайт открывается"
          fi
          MSG=$(printf '🚨 *Dommoda — проблема\!*\n\n%s\n%s\n\n🕐 %s' "$B" "$F" "$TIME")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${MSG}\",\"parse_mode\":\"Markdown\"}"

      - name: Alert on slow backend
        if: github.event.inputs.test_alert != 'true' && steps.backend.outputs.status == 'slow'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ELAPSED="${{ steps.backend.outputs.elapsed }}"
          TOTAL="${{ steps.backend.outputs.products_total }}"
          TIME=$(date -u '+%d.%m.%Y %H:%M UTC')
          MSG=$(printf '⚠️ *Dommoda — сервер просыпался*\n\n🐢 Бэкенд ответил за %s сек\n🛍 Товаров в базе: %s\n✅ Сейчас всё работает\n\n🕐 %s' "$ELAPSED" "$TOTAL" "$TIME")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${MSG}\",\"parse_mode\":\"Markdown\"}"
